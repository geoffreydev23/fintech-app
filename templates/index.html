<!DOCTYPE html>
<html>
<head>
    <title>Fintech App</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="manifest" href="/static/manifest.json">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            margin: auto;
        }

        form {
            background: #1e293b;
            padding: 15px;
            border-radius: 10px;
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin: 5px 0;
            border-radius: 5px;
            border: none;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #22c55e;
            border: none;
            color: white;
            font-weight: bold;
            border-radius: 5px;
        }

        .danger {
            background: red;
            margin-top: 10px;
        }

        .summary, .chart-container, .card {
            background: #1e293b;
            padding: 15px;
            border-radius: 10px;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="container">

    <h1>💰 Smart Finance Tracker</h1>

    <div class="summary">
        <p>Income: Ksh {{income}}</p>
        <p>Expenses: Ksh {{expenses}}</p>
        <p>Balance: Ksh {{balance}}</p>
    </div>

    <div class="chart-container">
        <canvas id="myChart"></canvas>
    </div>

    <div class="summary">
        <h3>🤖 AI Insights</h3>
        {% for insight in insights %}
            <p>{{insight}}</p>
        {% endfor %}
    </div>

    <!-- ADD TRANSACTION -->
    <form method="POST">
        <input name="amount" placeholder="Amount" required>

        <select name="type">
            <option value="expense">Expense</option>
            <option value="income">Income</option>
        </select>

        <input name="category" placeholder="Category (optional)">
        <input name="source" placeholder="Source">
        <input name="description" placeholder="Description">

        <button type="submit">Add Transaction</button>
    </form>

    <!-- 🗑️ CLEAR BUTTON (NEW) -->
    <form method="POST" action="/clear">
        <button class="danger">🗑️ Clear All Data</button>
    </form>

    <h2>Transactions</h2>

    {% for t in transactions %}
        <div class="card">
            Ksh {{t[1]}} - {{t[3]}} ({{t[2]}})
        </div>
    {% endfor %}

</div>

<script>
    const data = {{ category_data | tojson }};
    const labels = Object.keys(data);
    const values = Object.values(data);

    new Chart(document.getElementById('myChart'), {
        type: 'pie',
        data: {
            labels: labels,
            datasets: [{
                data: values
            }]
        }
    });
</script>

</body>
</html>
