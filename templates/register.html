<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .box {
            background: #1e293b;
            padding: 25px;
            border-radius: 10px;
            width: 300px;
        }

        h2 {
            text-align: center;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 5px;
            border: none;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #22c55e;
            border: none;
            color: white;
            font-weight: bold;
            border-radius: 5px;
        }

        a {
            color: lightblue;
            text-decoration: none;
        }

        p {
            text-align: center;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>📝 Register</h2>

    <form method="POST">
        <input name="username" placeholder="Username" required>
        <input name="password" type="password" placeholder="Password" required>

        <button type="submit">Create Account</button>
    </form>

    <p>
        Already have an account?
        <a href="/login">Login</a>
    </p>
</div>

</body>
</html>
